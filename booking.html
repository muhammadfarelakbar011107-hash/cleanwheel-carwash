<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Booking - CleanWheel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #f4f6f5; } /* Pastikan bg konsisten */

        .booking-page-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh; /* Agar form di tengah layar */
            padding: 20px;
        }

        .booking-card {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 500px; /* Batasi lebar agar tidak melebar polos */
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .booking-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Styling Kotak Detail Paket (Biar Gacor) */
        .service-summary-box {
            background: linear-gradient(135deg, #eaf6ff 0%, #f0f4ff 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid #d0e8ff;
            text-align: center;
        }

        .service-summary-box p {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .service-summary-box strong {
            color: #0088ff; /* Warna Electric */
            font-size: 1.1rem;
            display: block;
        }

        /* Styling Input Form agar Clean & Empuk */
        #finalForm input, #finalForm select {
            width: 100%;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        #finalForm input:focus, #finalForm select:focus {
            outline: none;
            border-color: #0088ff;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 136, 255, 0.1);
        }

        /* Tambahan buat tombol batal */
        .btn-secondary {
            background: none;
            border: none;
            color: #888;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon"><span style="color:white; font-weight:bold;">CW</span></div>
            <span class="logo-text">Electric Car Wash</span>
        </div>
    </header>

    <main class="booking-page-container">
        <div class="booking-card">
            <h2>Konfirmasi Booking</h2>
            
            <div class="service-summary-box" id="displayService">
                Sedang memuat paket...
            </div>

            <form id="finalForm">
                <input type="text" id="custName" placeholder="Nama Pemilik Mobil" required>
                <input type="text" id="carModel" placeholder="Tipe Mobil (ex: Tesla Model 3)" required>
                
                <select id="washTime" required>
                    <option value="">Pilih Jam Kedatangan</option>
                    <option>08:00 - 09:00 WIB</option>
                    <option>09:00 - 10:00 WIB</option>
                    <option>11:00 - 12:00 WIB</option>
                    <option>13:30 - 14:30 WIB</option>
                    <option>15:30 - 16:30 WIB</option>
                    <option>16:30 - 17:30 WIB</option>
                </select>

<input type="text" id="carPlate" placeholder="Nomor Kendaraan (ex: BG 1234 ABC)">

                <button type="submit" class="btn-select">Selesaikan Pesanan</button>
                <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">Kembali</button>
            </form>
        </div>
    </main>

    <script>
        // Mengambil data dari sessionStorage yang kamu simpan di halaman utama
        const data = JSON.parse(sessionStorage.getItem('chosenCarWashService'));
        
        if(data) {
            // Kita bikin formatnya lebih Gacor di sini
            document.getElementById('displayService').innerHTML = `
                <p>Anda telah memilih paket:</p>
                <strong>${data.name} — ${data.price}</strong>
            `;
        }

        // Handle Submit Form
        document.getElementById('finalForm').onsubmit = (e) => {
            e.preventDefault();
            const nama = document.getElementById('custName').value;
            alert(`Booking Berhasil! Halo ${nama}, pesanan paket ${data.name} Anda telah kami terima.`);
            window.location.href = 'index.html'; // Balik ke halaman utama
        };
    </script>
</body>
</html>
<script>
    // Ambil data paket yang dititip dari index.html
    const infoPaket = JSON.parse(sessionStorage.getItem('chosenCarWashService')) || {name: "Basic Wash"};

    document.getElementById('finalForm').onsubmit = function(e) {
        e.preventDefault();

        // Ambil data dari kotak input
        // PASTIKAN id "custName", "carModel", dan "washTime" ada di HTML kamu!
        const namaInput = document.getElementById('custName').value;
        const mobilInput = document.getElementById('carModel').value;
        const jamInput = document.getElementById('washTime').value;

        // Cek di console (F12) apakah data terbaca
        console.log("Mencoba simpan:", namaInput, mobilInput);

        const dataBaru = {
            nama: namaInput,
            mobil: mobilInput,
            jam: jamInput,
            paket: infoPaket.name,
            status: 'Menunggu'
        };

        // AMBIL LIST LAMA
        let listLama = JSON.parse(localStorage.getItem('allBookings')) || [];
        
        // TAMBAHKAN YANG BARU
        listLama.push(dataBaru);
        
        // SIMPAN KEMBALI
        localStorage.setItem('allBookings', JSON.stringify(listLama));

        alert("Berhasil! Data " + namaInput + " sudah dikirim ke Admin.");
        window.location.href = 'index.html'; 
    };
</script>
<div id="statusModal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter: blur(5px);">
    <div style="background:white; margin:10% auto; padding:30px; border-radius:20px; width:85%; max-width:400px; text-align:center; position:relative;">
        <span onclick="tutupModal()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:28px;">&times;</span>
        
        <h3 id="modalTitle">Status Mobil</h3>
        <hr style="opacity: 0.2; margin: 15px 0;">

        <div id="animationArea" style="height: 120px; display: flex; align-items: center; justify-content: center; position: relative;">
            <div id="carIcon" class="washing-animation">🚗</div>
            <div id="bubbleContainer"></div>
        </div>

        <h2 id="modalStatusText" style="margin: 10px 0;">Menunggu...</h2>
        <p id="modalDetailText" style="color: #666; margin-bottom: 20px;"></p>

        <button onclick="tutupModal()" style="width: 100%; padding: 12px; background: #0088ff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Tutup</button>
    </div>
</div>
<script>
document.getElementById('finalForm').onsubmit = function(e) {
    e.preventDefault();

    // Ambil data kiriman dari halaman index
    const infoLayanan = JSON.parse(localStorage.getItem('temp_booking'));

    const dataBaru = {
        nama: document.getElementById('custName').value,
        mobil: document.getElementById('carModel').value,
        plat: document.getElementById('carPlate').value,
        jam: document.getElementById('washTime').value,
        paket: infoLayanan.paket,
        status: 'Menunggu',
        // Keterangan pembayaran untuk Admin
        pembayaran: infoLayanan.statusBayar,
        metode: infoLayanan.metode
    };

    let listLama = JSON.parse(localStorage.getItem('allBookings')) || [];
    listLama.push(dataBaru);
    localStorage.setItem('allBookings', JSON.stringify(listLama));

    alert("Pesanan Masuk! Status: " + dataBaru.pembayaran);
    window.location.href = 'index.html';
};
// Di dalam file booking.html
const dataBaru = {
    nama: document.getElementById('custName').value,
    mobil: document.getElementById('carModel').value,
    plat: document.getElementById('carPlate').value, // Ambil dari input plat
    jam: document.getElementById('washTime').value,
    paket: infoLayanan.paket,
    status: 'Menunggu',
    pembayaran: infoLayanan.statusBayar, // Mengambil "Sudah Bayar" atau "Belum Bayar"
    metode: infoLayanan.metode
};
